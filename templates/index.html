<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Sistema de Análise de Documentos</title>

    <style>
        body {
            font-family: Arial;
            margin: 40px;
            background-color: #f4f6f8;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            width: 600px;
        }

        h1 {
            margin-top: 0;
        }

        .area-upload {
            border: 2px dashed #ccc;
            padding: 20px;
            margin-top: 20px;
        }

        button {
            margin-top: 15px;
            padding: 10px 18px;
            cursor: pointer;
        }

        .lista-arquivos {
            margin-top: 20px;
        }
    </style>

</head>

<body>
    
    <div class="container">
        
        <h1>📄 Análise Automatizada de Certidões</h1>
        
        <p>
            Envie arquivos PDF para processamento automático.
            O sistema irá analisar os documentos com auxilio da IA e gerar um relatório estruturado em Excel.
        </p>
        
        <!-- FORM DE UPLOAD -->
        
        {% if not relatorio_pronto %}
        <form action="/processar" method="post" enctype="multipart/form-data">
            
            <div class="area-upload">
                
                <label>Selecionar arquivos PDF:</label>
                
                <br><br>
                
                <input type="file" name="arquivos" accept=".pdf" multiple>
                
                
            </div>
            <button type="submit" id="botao-analise" style="display:none;">
                Iniciar análise
            </button>
            {% endif %}
        </form>
        <!-- DOWNLOAD -->

        {% if relatorio_pronto %}

        <form action="/download">

            <button type="submit">
                Baixar relatório Excel
            </button>

        </form>

        <form action="/remover-excel">

            <button type="submit">
                Nova analise
            </button>

        </form>

        {% endif %}

    </div>
    <script>

        const input = document.querySelector('input[type="file"]')
        const botao = document.getElementById("botao-analise")

        input.addEventListener("change", () => {

            if (input.files.length > 0) {
                botao.style.display = "inline-block"
            } else {
                botao.style.display = "none"
            }

        })


    </script>
</body>

</html>
